<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Usuarios</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container py-5">

    <h1 class="text-center mb-4 text-white">Panel de Usuarios</h1>

    <!-- BOTONES -->
    <div class="d-grid gap-2 mb-4">
      <button class="btn btn-primary" onclick="manager.listNames()">Lista nombres</button>
      <button class="btn btn-success" onclick="manager.findUserByName()">Buscar usuario</button>
      <button class="btn btn-warning" onclick="manager.showAddress()">Ver dirección</button>
      <button class="btn btn-info" onclick="manager.showAdvancedInfo()">Info avanzada</button>
      <button class="btn btn-secondary" onclick="manager.listCompanies()">Compañías</button>
      <button class="btn btn-light" onclick="manager.listNamesSorted()">Orden alfabético</button>
    </div>

    <!-- LOADER -->
    <div id="loader" class="text-center">
      <div class="spinner-border text-light"></div>
      <p class="text-white mt-2">Cargando datos...</p>
    </div>

    <!-- RESULTADOS -->
    <div id="output" class="row g-3 mt-3" style="display:none;"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
